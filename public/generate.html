<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Charan Panel — Generate Key</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <nav class="navbar">
    <span class="navbar-logo">CHARAN PANEL</span>
    <ul class="navbar-links">
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="generate.html" class="active">Generate</a></li>
      <li><a href="keys.html">Keys</a></li>
      <li><a href="#" class="logout" id="logoutBtn">Logout</a></li>
    </ul>
  </nav>

  <div class="container">
    <h1 class="page-title">Generate Key</h1>

    <div class="form-card">
      <h2>New Key</h2>
      <div id="alertBox" class="alert alert-error" style="display:none;"></div>
      <form id="generateForm">
        <div class="form-group">
          <label for="game">Game</label>
          <select id="game">
            <option value="BGMI">BGMI</option>
            <option value="PUBG">PUBG</option>
          </select>
        </div>
        <div class="form-group">
          <label for="expiry">Expiry (days)</label>
          <input type="number" id="expiry" value="30" min="1" />
        </div>
        <div class="form-group">
          <label for="maxDevices">Max Devices</label>
          <input type="number" id="maxDevices" value="3" min="1" />
        </div>
        <button type="submit" class="btn btn-accent">Generate Key</button>
      </form>

      <div id="resultArea" style="display:none;">
        <div class="key-display">
          <div class="key-text" id="generatedKey"></div>
          <button class="btn btn-outline btn-small copy-btn" id="copyBtn">Copy Key</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { db } from "./js/firebase-config.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    if (localStorage.getItem("logged_in") !== "true") {
      window.location.href = "index.html";
    }

    document.getElementById("logoutBtn").addEventListener("click", (e) => {
      e.preventDefault();
      localStorage.removeItem("logged_in");
      window.location.href = "index.html";
    });

    function generateKey() {
      const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
      const segments = [];
      for (let s = 0; s < 4; s++) {
        let seg = "";
        for (let i = 0; i < 4; i++) {
          seg += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        segments.push(seg);
      }
      return segments.join("-");
    }

    document.getElementById("generateForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const alertBox = document.getElementById("alertBox");
      alertBox.style.display = "none";

      const game = document.getElementById("game").value;
      const expiryDays = parseInt(document.getElementById("expiry").value) || 30;
      const maxDevices = parseInt(document.getElementById("maxDevices").value) || 3;
      const key = generateKey();
      const expiredDate = Date.now() + expiryDays * 24 * 60 * 60 * 1000;

      try {
        await addDoc(collection(db, "keys"), {
          user_key: key,
          game: game,
          status: true,
          max_devices: maxDevices,
          expired_date: expiredDate,
          created_at: Date.now(),
          device_count: 0,
        });

        document.getElementById("generatedKey").textContent = key;
        document.getElementById("resultArea").style.display = "block";
        document.getElementById("generateForm").reset();
        document.getElementById("game").value = game;
        document.getElementById("expiry").value = expiryDays;
        document.getElementById("maxDevices").value = maxDevices;
      } catch (err) {
        alertBox.textContent = "Error: " + err.message;
        alertBox.style.display = "block";
      }
    });

    document.getElementById("copyBtn").addEventListener("click", () => {
      const key = document.getElementById("generatedKey").textContent;
      navigator.clipboard.writeText(key).then(() => {
        const btn = document.getElementById("copyBtn");
        btn.textContent = "Copied!";
        setTimeout(() => { btn.textContent = "Copy Key"; }, 2000);
      });
    });
  </script>
</body>
</html>
