[build]
  publish = "public"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/connect"
  to = "/.netlify/functions/connect"
  status = 200
  force = true

[[headers]]
  for = "/api/connect"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "POST, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type"
